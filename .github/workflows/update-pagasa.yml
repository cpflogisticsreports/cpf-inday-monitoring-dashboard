name: Update PAGASA bulletin

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pagasa-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      STORM_NAME: INDAY
      OUT_PATH: docs/latest_inday_pagasa.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PDF parser
        run: python -m pip install --upgrade pypdf
      - name: Fetch latest PAGASA TCB archive PDF and regenerate JSON
        run: python scripts/update_pagasa.py
      - name: Commit & push if JSON changed
        run: |
          if [ -n "$(git status --porcelain "$OUT_PATH")" ]; then
            git config user.name "pagasa-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$OUT_PATH"
            git commit -m "chore(pagasa): auto-update $OUT_PATH [skip ci]"
            git push
          else
            echo "No JSON changes."
          fi
